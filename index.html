<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي البسيط</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .user {
            background-color: #2563eb;
            color: white;
            align-self: flex-start; /* لتظهر جهة المستخدم */
        }
        .bot {
            background-color: #1e293b;
            color: #f1f5f9;
            align-self: flex-end; /* لتظهر جهة البوت */
            border: 1px solid #334155;
        }
        #input-container {
            padding: 15px;
            background-color: #1e293b;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }
        textarea {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 10px;
            border-radius: 8px;
            resize: none;
            height: 24px;
            font-family: inherit;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <header>المساعد البرمجي الذكي 🤖</header>

    <div id="chat-container">
        <div class="message bot">مرحباً بك! أنا الذكاء الاصطناعي الخاص بك، كيف يمكنني مساعدتك برمجياً اليوم؟</div>
    </div>

    <div id="input-container">
        <textarea id="user-input" placeholder="اكتب سؤالك هنا..."></textarea>
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        // حفظ سياق المحادثة (الذاكرة) ليتذكر البوت الأسئلة السابقة
        let conversationHistory = [
            { role: "system", content: "أنت مستشار برمجيات خبير ومساعد ذكي تجيب باللغة العربية الفصحى وبشكل احترافي." }
        ];

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();
            
            if (!messageText) return;

            const chatContainer = document.getElementById('chat-container');

            // 1. عرض رسالة المستخدم في الواجهة
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = messageText;
            chatContainer.appendChild(userDiv);
            
            // مسح حقل الإدخال ونزول التمرير لأسفل
            inputField.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 2. حفظ الرسالة في الذاكرة
            conversationHistory.push({ role: "user", content: messageText });

            // 3. عرض رسالة مؤقتة "جارٍ التفكير..." للبوت
            const botDiv = document.createElement('div');
            botDiv.className = 'message bot';
            botDiv.textContent = 'جاري التفكير...';
            chatContainer.appendChild(botDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // 4. الاتصال المباشر بمحرك الذكاء الاصطناعي (OpenRouter)
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-exp:free",
                        messages: conversationHistory
                    })
                });

                const data = await response.json();
                const botReply = data.choices[0].message.content;

                // 5. استبدال نص الانتظار برقم الرد الحقيقي للبوت وحفظه في الذاكرة
                botDiv.textContent = botReply;
                conversationHistory.push({ role: "assistant", content: botReply });

            } catch (error) {
                botDiv.textContent = 'عذراً، حدث خطأ في الاتصال بالذكاء الاصطناعي.';
            }

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // إمكانية الإرسال عند ضغط زر Enter
        document.getElementById('user-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
